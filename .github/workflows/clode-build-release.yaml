name: Clode Release
on:
  push:
    branches:
      - 'feat/*'
      - 'main'
    tags:
      - 'clode-v*'

env:
  GHCR_IMAGE: ghcr.io/clode-labs/karpenter-controller

permissions:
  contents: read
  packages: write

jobs:
  release:
    name: Build & Push Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install ko
        run: go install github.com/google/ko@latest

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/clode-v* ]]; then
            TAG="${GITHUB_REF#refs/tags/clode-}"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "latest=true" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            echo "tag=dev-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push with ko
        run: |
          TAGS="${{ steps.tag.outputs.tag }}"
          if [[ "${{ steps.tag.outputs.latest }}" == "true" ]]; then
            TAGS="${TAGS},latest"
          fi
          KO_DOCKER_REPO=${{ env.GHCR_IMAGE }} \
          ko build --bare --tags "${TAGS}" \
            --platform linux/amd64 \
            github.com/aws/karpenter-provider-aws/cmd/controller

      - name: Output image
        run: |
          echo "### Image Published" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${{ env.GHCR_IMAGE }}:${{ steps.tag.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
